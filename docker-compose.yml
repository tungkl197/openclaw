services:
  openclaw-gateway:
    build: .
    container_name: openclaw-gateway

    # 👇 FIX permission ngay khi start
    user: root

    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: UTC
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}

    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace

    command:
      [
        "sh",
        "-c",
        "chown -R node:node /home/node/.openclaw && su node -c 'node dist/index.js gateway --bind lan --port 18789 --allow-unconfigured'"
      ]

    restart: unless-stopped

    labels:
      - "traefik.enable=true"

      # 🔥 ĐỔI DOMAIN TẠI ĐÂY
      - "traefik.http.routers.openclaw.rule=Host(`openclaw.aiautomationv001.fun`)"

      - "traefik.http.routers.openclaw.entrypoints=websecure"
      - "traefik.http.routers.openclaw.tls=true"
      - "traefik.http.routers.openclaw.tls.certresolver=letsencrypt"

      - "traefik.http.services.openclaw.loadbalancer.server.port=18789"

    networks:
      - coolify

  openclaw-cli:
    build: .
    container_name: openclaw-cli

    network_mode: "service:openclaw-gateway"

    user: root

    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: UTC

    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace

    command:
      [
        "sh",
        "-c",
        "chown -R node:node /home/node/.openclaw && su node -c 'node dist/index.js'"
      ]

    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  openclaw_config:
  openclaw_workspace:

networks:
  coolify:
    external: true
